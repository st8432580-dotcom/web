<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEAUTY HUB | Salon</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <section class="hero">
        <div class="container">
            <div class="logo-box">
                <h1 class="main-title">BEAUTY</h1>
                <h1 class="main-title">HUB</h1>
                <p class="subtitle">SALON | BEAUTY | WELLNESS</p>
                <div class="divider"></div>
            </div>
            <div class="cta-group">
                <a href="#prices" class="btn-text">ПЕРЕГЛЯНУТИ ПРАЙС</a>
                <a href="https://t.me/Beautyy_Hub" class="btn-gold">ЗАПИСАТИСЬ</a>
            </div>
        </div>
    </section>

    <section id="prices" class="price-section">
        <div class="price-list">
            <h2>Послуги та ціни</h2>
            
            <div class="price-item">
                <span class="service">Манікюр (комплекс)</span>
                <span class="dots"></span>
                <span class="cost">700/800 грн</span>
            </div>
            <div class="price-item">
                <span class="service">Нарощення нігтів</span>
                <span class="dots"></span>
                <span class="cost">від 1000 грн</span>
            </div>
            <div class="price-item">
                <span class="service">Жіноча стрижка</span>
                <span class="dots"></span>
                <span class="cost">600-800 грн</span>
            </div>
            <div class="price-item">
                <span class="service">Фарбування</span>
                <span class="dots"></span>
                <span class="cost">від 1300 грн</span>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 BEAUTY HUB. Aesthetic & Care.</p>
    </footer>

</body>
</html>
