<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEAUTY HUB | Marble & Bloom</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fff;
            /* Реалістичний мармур через накладання градієнтів */
            background-image: 
                linear-gradient(145deg, rgba(230,230,230,0.2) 0%, transparent 40%),
                radial-gradient(at 10% 20%, rgba(150,150,150,0.05) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(150,150,150,0.05) 0px, transparent 50%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.02' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            color: #4a4a4a;
            overflow-x: hidden;
        }

        /* Фікс для квітів: ніяких обрізаних країв */
        .flower-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: visible;
        }

        .flower {
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.4;
            animation: floatAnim 15s ease-in-out infinite;
        }

        @keyframes floatAnim {
            0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(15px, -15px) scale(1.05) rotate(5deg); }
        }

        /* SVG квіти з м'якими формами */
        .f-pink { background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill='%23e2b2b2' d='M50 20c15-15 45-5 45 25s-25 35-45 15c-20 20-45 10-45-15s30-40 45-25z'/%3E%3C/svg%3E"); }
        .f-purple { background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill='%23c1b2e2' d='M50 20c15-15 45-5 45 25s-25 35-45 15c-20 20-45 10-45-15s30-40 45-25z'/%3E%3C/svg%3E"); }
        .f-blue { background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill='%23b2d1e2' d='M50 20c15-15 45-5 45 25s-25 35-45 15c-20 20-45 10-45-15s30-40 45-25z'/%3E%3C/svg%3E"); }

        /* Позиції квітів зміщені від країв, щоб не різало */
        .p1 { top: 5%; left: 5%; width: 250px; height: 250px; }
        .p2 { top: 10%; right: 5%; width: 200px; height: 200px; animation-delay: -2s; }
        .p3 { bottom: 10%; left: 5%; width: 220px; height: 220px; animation-delay: -4s; }
        .p4 { bottom: 5%; right: 5%; width: 280px; height: 280px; animation-delay: -6s; }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            position: relative;
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: clamp(40px, 10vw, 85px);
            color: #9c6d6d;
            letter-spacing: 10px;
            text-transform: uppercase;
            text-align: center;
        }

        .subtitle {
            font-size: 11px; letter-spacing: 4px; color: #888;
            margin-bottom: 40px; text-transform: uppercase;
        }

        .btn-group { display: flex; flex-direction: column; gap: 15px; }

        .btn {
            padding: 18px 50px; border-radius: 50px; text-decoration: none;
            font-size: 12px; font-weight: 600; text-transform: uppercase;
            transition: 0.3s; text-align: center;
        }

        .btn-main { background: #9c6d6d; color: white; }
        .btn-outline { border: 1px solid #9c6d6d; color: #9c6d6d; background: rgba(255,255,255,0.6); }

        /* ПОВНИЙ ПРАЙС */
        .price-container {
            max-width: 800px; margin: 0 auto 100px; padding: 60px 30px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            position: relative; z-index: 10;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .price-title { font-family: 'Playfair Display', serif; font-size: 40px; text-align: center; margin-bottom: 50px; }

        .cat { margin-bottom: 40px; }
        .cat h3 { font-size: 12px; color: #9c6d6d; letter-spacing: 3px; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 20px; text-transform: uppercase; }

        .item { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 16px; }
        .dots { flex-grow: 1; border-bottom: 1px dotted #ccc; margin: 0 10px; position: relative; top: -4px; }
        .val { font-weight: 600; }

        @media (min-width: 600px) { .btn-group { flex-direction: row; } }
    </style>
</head>
<body>

    <div class="flower-container">
        <div class="flower f-pink p1"></div>
        <div class="flower f-purple p2"></div>
        <div class="flower f-blue p3"></div>
        <div class="flower f-pink p4"></div>
    </div>

    <header class="hero">
        <h1 class="brand">BEAUTY HUB</h1>
        <p class="subtitle">SALON | BEAUTY | WELLNESS</p>
        <div class="btn-group">
            <a href="https://t.me/Beautyy_Hub" class="btn btn-main">ЗАПИСАТИСЬ</a>
            <a href="#price" class="btn btn-outline">ПРАЙС ПОСЛУГ</a>
        </div>
    </header>

    <section id="price" class="price-container">
        <h2 class="price-title">Прайс послуг</h2>

        <div class="cat">
            <h3>Нігтьовий сервіс</h3>
            <div class="item"><span>Манікюр (комплекс)</span><span class="dots"></span><span class="val">700 грн</span></div>
            <div class="item"><span>Педикюр (комплекс)</span><span class="dots"></span><span class="val">850 грн</span></div>
        </div>

        <div class="cat">
            <h3>Брови та Вії</h3>
            <div class="item"><span>Корекція брів</span><span class="dots"></span><span class="val">450 грн</span></div>
            <div class="item"><span>Ламінування вій</span><span class="dots"></span><span class="val">800 грн</span></div>
        </div>

        <div class="cat">
            <h3>Волосся</h3>
            <div class="item"><span>Стрижка жіноча</span><span class="dots"></span><span class="val">від 600 грн</span></div>
            <div class="item"><span>Фарбування</span><span class="dots"></span><span class="val">від 1500 грн</span></div>
        </div>
    </section>

</body>
</html>
