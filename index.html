<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEAUTY HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #fffafb; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Декоративні елементи як на скріншоті */
        .bg-element {
            position: absolute;
            z-index: -1;
            background: #f4d0d0;
            opacity: 0.3;
            border-radius: 50%;
            filter: blur(50px);
        }
        .el-1 { width: 300px; height: 300px; top: -50px; left: -100px; }
        .el-2 { width: 250px; height: 250px; bottom: 50px; right: -50px; }

        .container { text-align: center; max-width: 800px; width: 100%; padding: 20px; }

        .brand { 
            font-family: 'Playfair Display', serif; 
            font-size: 64px; 
            color: #5a3e3e; 
            letter-spacing: 8px; 
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .services-list {
            font-size: 10px;
            letter-spacing: 5px;
            color: #a0a0a0;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 45px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
            cursor: pointer;
            min-width: 220px;
        }

        .btn-call {
            background-color: #9c7a7a;
            color: white;
            border: none;
        }

        .btn-call:hover { background-color: #8a6969; }

        .btn-price {
            background-color: transparent;
            color: #9c7a7a;
            border: 1px solid #9c7a7a;
        }

        .btn-price:hover { background-color: #fff0f0; }

        .contacts { font-size: 14px; color: #5a3e3e; }
        .contacts div { margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .contacts a { text-decoration: none; color: inherit; }
        
        @media (max-width: 600px) {
            .brand { font-size: 40px; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="bg-element el-1"></div>
    <div class="bg-element el-2"></div>

    <div class="container">
        <h1 class="brand">BEAUTY HUB</h1>
        <div class="services-list">Макіяж | Брови | Вії | Волосся</div>

        <div class="buttons">
            <!-- Кнопка виклику -->
            <a href="tel:+380932941733" class="btn btn-call">Зателефонувати</a>
            <a href="#" class="btn btn-price" onclick="alert('Тут буде ваш прайс');">Прайс послуг</a>
        </div>

        <div class="contacts">
            <div>📞 <a href="tel:+380932941733">+380 93 294 17 33</a></div>
            <div>📸 <a href="https://www.instagram.com/beauty._._hub">@beauty._._hub</a></div>
            <div>📍 Братиславська 10</div>
        </div>
    </div>

</body>
</html>
