<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautyy_Hub | Studio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-animation"></div>

    <header class="hero">
        <div class="glass-card">
            <h1 class="logo">Beautyy<span>Hub</span></h1>
            <p class="tagline">Твій простір ідеального стилю</p>
            <div class="nav-links">
                <a href="#price" class="btn-outline">Прайс</a>
                <a href="https://t.me/Beautyy_Hub" class="btn-main">Записатись</a>
            </div>
        </div>
    </header>

    <section id="price" class="price-container">
        <div class="price-card">
            <h2>Манікюр & Педикюр</h2>
            <div class="price-item"><span>Манікюр</span><span>400</span></div>
            <div class="price-item"><span>Комплекс манікюру</span><span>700/800</span></div>
            <div class="price-item"><span>Укріплення гель/пудра</span><span>100</span></div>
            <div class="price-item"><span>Нарощення (1,2,3)</span><span>1000/1200</span></div>
            <div class="price-item"><span>Педикюр Комплекс</span><span>750-950</span></div>
        </div>

        <div class="price-card">
            <h2>Волосся</h2>
            <div class="price-item"><span>Стрижка жіноча</span><span>600-800</span></div>
            <div class="price-item"><span>Фарбування коренів</span><span>1300+</span></div>
            <div class="price-item"><span>Мелірування</span><span>2500+</span></div>
        </div>
    </section>

    <footer>
        <p>Created for Beautyy_Hub @ 2026</p>
    </footer>

</body>
</html>
